<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shri Brand — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/order-history.css" />
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <div class="shell">
      <!-- ═══ HEADER ═══ -->
      <header>
        <div class="header-brand">
          <div class="emblem">
            <div class="emblem-outer"></div>
            <div class="emblem-inner"></div>
            <div class="emblem-letter">S</div>
          </div>
          <div class="brand-info">
            <div class="brand-name">Shri <span>Brand</span></div>
          </div>
        </div>

        <div class="header-right">
          <!-- Search -->

          <!-- Notifications -->
          <div class="h-icon h-icon-notif" title="Notifications">
            <svg
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              viewBox="0 0 24 24"
            >
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </div>

          <div class="h-divider"></div>

          <div class="h-avatar" title="Admin">AD</div>

          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </header>

      <!-- ═══ SIDEBAR ═══ -->
      <aside id="sidebar">
        <!-- Profile block -->

        <!-- Navigation -->
        <nav class="nav-section">
          <div class="nav-group-label">Main</div>

          <button class="nav-item active" data-page="dashboard">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
            </div>
            Dashboard
          </button>

          <button class="nav-item" data-page="products">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <path d="M16 10a4 4 0 0 1-8 0" />
              </svg>
            </div>
            Products
          </button>

          <button class="nav-item" data-page="users">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
              </svg>
            </div>
            Users
          </button>

          <!-- Ornamental separator -->
          <div class="orn-divider" style="margin-top: 6px">
            <div class="orn-line"></div>
            <div class="orn-diamond"></div>
            <div class="orn-line"></div>
          </div>

          <div class="nav-group-label">Orders</div>

          <button class="nav-item" data-page="recent-orders">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <path
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
              </svg>
            </div>
            Recent Orders
            <span class="nav-badge">12</span>
          </button>

          <button class="nav-item" data-page="order-history">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <polyline points="12 8 12 12 14 14" />
                <path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5" />
              </svg>
            </div>
            Order History
          </button>

          <!-- Ornamental separator -->
          <div class="orn-divider" style="margin-top: 6px">
            <div class="orn-line"></div>
            <div class="orn-diamond"></div>
            <div class="orn-line"></div>
          </div>

          <div class="nav-group-label">Communications</div>

          <button class="nav-item" data-page="messages">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                />
              </svg>
            </div>
            Messages
            <span class="nav-badge">3</span>
          </button>

          <!-- Ornamental separator -->
          <div class="orn-divider" style="margin-top: 6px">
            <div class="orn-line"></div>
            <div class="orn-diamond"></div>
            <div class="orn-line"></div>
          </div>

          <div class="nav-group-label">System</div>

          <button class="nav-item" data-page="settings">
            <div class="nav-item-icon">
              <svg
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                viewBox="0 0 24 24"
              >
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                />
              </svg>
            </div>
            Settings
          </button>
        </nav>

        <!-- Footer -->
        <div class="sidebar-footer">
          <button class="signout-btn">
            <svg
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              viewBox="0 0 24 24"
            >
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Sign Out
          </button>
        </div>
      </aside>

      <!-- ═══ MAIN (empty — your content goes here) ═══ -->
      <main>
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-products"></div>
        <div class="page" id="page-users"></div>
        <div class="page" id="page-recent-orders"></div>
        <div class="page erp-body" id="page-order-history">
          <div class="erp-toast" id="erpToast">
            <div class="erp-toast-icon">
              <i class="fas fa-check"></i>
            </div>
            <div>
              <div class="erp-toast-message" id="erpToastMessage">
                Filters cleared successfully
              </div>
              <div class="erp-toast-time" id="erpToastTime">Just now</div>
            </div>
          </div>

          <!-- Calendar Popup -->
          <div class="erp-calendar-popup" id="erpCalendarPopup">
            <div class="erp-calendar-header">
              <div class="erp-calendar-nav">
                <button id="erpPrevMonth">
                  <i class="fas fa-chevron-left"></i>
                </button>
                <button id="erpNextMonth">
                  <i class="fas fa-chevron-right"></i>
                </button>
              </div>
              <div class="erp-calendar-title" id="erpCalendarTitle">
                April 2024
              </div>
            </div>
            <div class="erp-calendar-grid" id="erpCalendarDays">
              <!-- Day headers -->
              <div class="erp-calendar-day">Sun</div>
              <div class="erp-calendar-day">Mon</div>
              <div class="erp-calendar-day">Tue</div>
              <div class="erp-calendar-day">Wed</div>
              <div class="erp-calendar-day">Thu</div>
              <div class="erp-calendar-day">Fri</div>
              <div class="erp-calendar-day">Sat</div>
            </div>
            <div class="erp-calendar-grid" id="erpCalendarDates">
              <!-- Dates will be populated by JavaScript -->
            </div>
            <div class="erp-calendar-actions">
              <button class="cancel-btn" id="erpCancelDate">Cancel</button>
              <button class="apply-btn" id="erpApplyDate">Apply Date</button>
            </div>
          </div>

          <div class="erp-header">
            <h1>Orders History</h1>
            <div class="erp-actions">
              <button class="erp-btn" id="erpClearBtn">
                <i class="fas fa-broom"></i> Clear Filters
              </button>
              <button class="erp-btn erp-primary" id="erpExportBtn">
                <i class="fas fa-download"></i> Export
              </button>
              <button class="erp-btn" id="erpRefreshBtn">
                <i class="fas fa-sync-alt"></i> Refresh
              </button>
            </div>
          </div>

          <div class="erp-controls">
            <div class="erp-search-wrapper">
              <i class="fas fa-search"></i>
              <input
                id="erpSearch"
                placeholder="Search by Order ID, customer name, items..."
              />
            </div>

            <div class="erp-filter-group">
              <label class="erp-filter-label">Payment Method</label>
              <select id="erpPayment">
                <option value="">All Payments</option>
                <option value="upi">UPI</option>
                <option value="cash">Cash</option>
              </select>
            </div>

            <div class="erp-filter-group erp-calendar-container">
              <label class="erp-filter-label">Start Date</label>
              <div class="erp-date-wrapper">
                <i class="fas fa-calendar-alt"></i>
                <input
                  type="text"
                  id="erpStartDate"
                  readonly
                  placeholder="Select start date"
                />
              </div>
            </div>

            <div class="erp-filter-group erp-calendar-container">
              <label class="erp-filter-label">End Date</label>
              <div class="erp-date-wrapper">
                <i class="fas fa-calendar-alt"></i>
                <input
                  type="text"
                  id="erpEndDate"
                  readonly
                  placeholder="Select end date"
                />
              </div>
            </div>

            <div class="erp-filter-group">
              <label class="erp-filter-label">Min Amount</label>
              <input
                type="number"
                id="erpMin"
                placeholder="₹ Minimum"
                min="0"
              />
            </div>

            <div class="erp-filter-group">
              <label class="erp-filter-label">Max Amount</label>
              <input
                type="number"
                id="erpMax"
                placeholder="₹ Maximum"
                min="0"
              />
            </div>
          </div>

          <div class="erp-card">
            <table class="erp-table">
              <thead>
                <tr>
                  <th data-erp-sort="id">Order ID</th>
                  <th data-erp-sort="n">Customer</th>
                  <th data-erp-sort="i">Items</th>
                  <th data-erp-sort="t">Total</th>
                  <th data-erp-sort="p">Payment</th>
                  <th data-erp-sort="timestamp">Date</th>
                </tr>
              </thead>
              <tbody id="erpTbody" class="erp-tbody">
                <!-- Orders will be loaded here -->
              </tbody>
            </table>

            <!-- Empty State -->
            <div class="erp-empty-state" id="erpEmptyState">
              <div class="erp-empty-icon">
                <i class="fas fa-inbox"></i>
              </div>
              <h3>No Orders Found</h3>
              <p>
                Try adjusting your filters or search terms to find what you're
                looking for.
              </p>
              <button class="erp-btn" id="erpClearAllBtn">
                <i class="fas fa-times"></i> Clear All Filters
              </button>
            </div>

            <div class="erp-pagination" id="erpPages">
              <div class="erp-pagination-info" id="erpPageInfo">
                Loading orders...
              </div>
            </div>
          </div>
        </div>
        <div class="page" id="page-messages"></div>
        <div class="page" id="page-settings"></div>
      </main>
    </div>
<script src="./js/orderHistory.js"></script>
    <script>
      const navItems = document.querySelectorAll(".nav-item[data-page]");
      const pages = document.querySelectorAll(".page");

      function navigate(pageId) {
        navItems.forEach((b) =>
          b.classList.toggle("active", b.dataset.page === pageId),
        );
        pages.forEach((p) =>
          p.classList.toggle("active", p.id === "page-" + pageId),
        );
        closeSidebar();
      }

      navItems.forEach((btn) =>
        btn.addEventListener("click", () => navigate(btn.dataset.page)),
      );

      const sidebar = document.getElementById("sidebar");
      const hamburger = document.getElementById("hamburger");
      const overlay = document.getElementById("overlay");

      function openSidebar() {
        sidebar.classList.add("open");
        overlay.classList.add("open");
      }
      function closeSidebar() {
        sidebar.classList.remove("open");
        overlay.classList.remove("open");
      }

      hamburger.addEventListener("click", () =>
        sidebar.classList.contains("open") ? closeSidebar() : openSidebar(),
      );
      overlay.addEventListener("click", closeSidebar);
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e0e0e;--surface:#181818;--surface2:#222;--surface3:#2a2a2a;
  --border:#303030;--text:#f0f0f0;--muted:#999;--faint:#555;
  --accent:#ff6b35;--love:#ff4560;--read:#22c55e;
  --admin-clr:#a78bfa;--admin-bg:rgba(139,92,246,.08);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{position:sticky;top:0;z-index:300;background:rgba(14,14,14,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{font-family:'Fraunces',serif;font-size:21px;font-weight:700;cursor:pointer;user-select:none;white-space:nowrap}
.logo span{color:var(--accent)}
.search-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:22px;padding:0 14px;gap:8px;height:36px;flex:1;max-width:380px;transition:border-color .2s}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;width:100%}
.search-wrap svg{color:var(--muted);flex-shrink:0}
.spacer{flex:1}
.url-row{display:flex;align-items:center;gap:8px;font-size:12px}
.url-row label{color:var(--muted);white-space:nowrap;font-weight:600}
.url-row input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text);font-family:'Nunito',monospace;font-size:11px;outline:none;width:220px;transition:border-color .2s}
.url-row input:focus{border-color:var(--accent)}
.dot-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex-shrink:0}
.dot.ok{background:var(--read);box-shadow:0 0 6px var(--read)}
.dot.err{background:var(--love);box-shadow:0 0 6px var(--love)}
.auth-btn{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;transition:all .18s;white-space:nowrap}
.auth-btn:hover{border-color:var(--accent);color:var(--accent)}
.auth-btn.in{border-color:var(--accent);background:rgba(255,107,53,.1);color:var(--accent)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:linear-gradient(135deg,var(--accent),#ffb347);color:#fff;flex-shrink:0}
.av.admin{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.admin-bar{background:rgba(124,58,237,.06);border-bottom:1px solid rgba(139,92,246,.25);padding:6px 20px;font-size:12px;color:var(--admin-clr);display:none;align-items:center;gap:6px;font-weight:600}
.admin-bar.show{display:flex}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:380px;max-width:94vw;padding:30px;transform:translateY(18px);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.modal-h{font-family:'Fraunces',serif;font-size:22px;font-weight:700;margin-bottom:4px}
.modal-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.modal-tabs{display:flex;background:var(--surface2);border-radius:9px;padding:3px;margin-bottom:20px;gap:2px}
.mtab{flex:1;padding:7px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;border-radius:7px;transition:all .15s}
.mtab.on{background:var(--accent);color:#fff}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase}
.mfield input{width:100%;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.mfield input:focus{border-color:var(--accent)}
.mfooter{display:flex;gap:8px;margin-top:6px}
.btn-pri{flex:1;padding:11px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s}
.btn-pri:hover{background:#e55a28;transform:translateY(-1px)}
.btn-pri:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-sec{padding:11px 16px;border:1px solid var(--border);border-radius:9px;background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer;transition:all .18s}
.btn-sec:hover{color:var(--text);border-color:#555}
.mmsg{font-size:12px;margin-top:8px;min-height:16px}
.mmsg.err{color:#f87171}.mmsg.ok{color:var(--read)}

/* HOME */
#homeView{display:block}
#detailView{display:none}
.home-inner{max-width:1180px;margin:0 auto;padding:28px 20px}
.sec-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.5);border-color:#3a3a3a}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--surface2)}
.card-img-ph{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1c1c1c,#262626);display:flex;align-items:center;justify-content:center;font-size:38px}
.rt-badge{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.75);color:#ccc;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px}
.feat-badge{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase}
.card-body{padding:13px 15px 15px}
.card-cat{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.card-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;line-height:1.4;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-sub{font-size:13px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--faint)}
.card-author{color:var(--muted);font-weight:600}

/* DETAIL */
.detail-inner{max-width:820px;margin:0 auto;padding:28px 20px}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;margin-bottom:24px;transition:color .18s}
.back:hover{color:var(--text)}
.back:hover svg{transform:translateX(-3px)}
.back svg{transition:transform .18s}
.detail-cover{width:100%;border-radius:14px;aspect-ratio:16/7;object-fit:cover;margin-bottom:24px;display:block}
.detail-cover-ph{width:100%;border-radius:14px;aspect-ratio:16/7;background:linear-gradient(135deg,var(--surface),var(--surface2));display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:24px}
.detail-cat{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.detail-title{font-family:'Fraunces',serif;font-size:34px;font-weight:700;line-height:1.2;margin-bottom:12px}
.detail-sub{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:18px;font-weight:300}
.detail-meta{display:flex;align-items:center;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--muted);padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.detail-author{color:var(--text);font-weight:700}
.mdot{color:var(--faint)}

/* POST REACTION BAR — love = like post, read = mark read */
.post-rxn-bar{display:flex;align-items:center;gap:8px;padding:14px 0;margin-bottom:28px;border-bottom:1px solid var(--border)}
.post-rxn-bar .bar-label{font-size:13px;color:var(--muted);font-weight:600;margin-right:4px}
.prx{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:22px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;transition:all .18s}
.prx:hover{border-color:#555;background:var(--surface2)}
.prx.love-on{border-color:var(--love);color:var(--love);background:rgba(255,69,96,.1)}
.prx.read-on{border-color:var(--read);color:var(--read);background:rgba(34,197,94,.1)}
.prx .cnt{font-weight:700}

/* BLOG CONTENT */
.blog-content{font-size:16px;line-height:1.9;color:#d5d5d5;margin-bottom:36px}
.blog-content h1,.blog-content h2,.blog-content h3{font-family:'Fraunces',serif;color:var(--text);margin:28px 0 12px}
.blog-content h1{font-size:27px}.blog-content h2{font-size:23px}.blog-content h3{font-size:19px}
.blog-content p{margin-bottom:16px}
.blog-content blockquote{border-left:3px solid var(--accent);padding:12px 18px;margin:20px 0;background:rgba(255,107,53,.05);border-radius:0 10px 10px 0;font-style:italic;color:var(--muted)}
.blog-content img{width:100%;border-radius:10px;margin:16px 0}
.blog-content ul,.blog-content ol{padding-left:1.6em;margin-bottom:16px}
.blog-content li{margin-bottom:5px}

/* COMMENTS */
.comments-wrap{border-top:1px solid var(--border);padding-top:28px}
.comments-hdr{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.comments-hdr h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.cnt-badge{background:var(--surface2);color:var(--muted);font-size:13px;font-weight:700;padding:2px 10px;border-radius:10px}

/* COMMENT INPUT */
.ci-wrap{display:flex;gap:12px;margin-bottom:28px;align-items:flex-start}
.cav{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--surface3);color:var(--muted)}
.cav.u{background:linear-gradient(135deg,var(--accent),#ffb347);color:#fff}
.cav.a{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.ci-right{flex:1}
.ci-ta{width:100%;background:none;border:none;border-bottom:2px solid var(--border);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;resize:none;padding:6px 0;min-height:38px;line-height:1.5;transition:border-color .2s}
.ci-ta:focus{border-bottom-color:var(--text)}
.ci-ta::placeholder{color:var(--faint)}
.ci-acts{display:flex;justify-content:flex-end;gap:7px;margin-top:8px;max-height:0;overflow:hidden;opacity:0;transition:max-height .2s,opacity .2s}
.ci-acts.vis{max-height:50px;opacity:1}
.ca-cancel{padding:7px 16px;border-radius:20px;border:none;background:none;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;transition:color .15s}
.ca-cancel:hover{color:var(--text)}
.ca-sub{padding:7px 18px;border-radius:20px;border:none;background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:all .18s}
.ca-sub.on{background:var(--accent);color:#fff}
.ca-sub:disabled{opacity:.5;cursor:not-allowed}
.login-prompt{flex:1;padding:8px 0;font-size:14px;color:var(--muted)}
.login-prompt a{color:var(--accent);cursor:pointer;font-weight:700;text-decoration:none}
.login-prompt a:hover{text-decoration:underline}

/* COMMENT ITEM */
.comment-item{display:flex;gap:12px;margin-bottom:22px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cb-wrap{flex:1;min-width:0}
.c-top{display:flex;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.c-name{font-size:13px;font-weight:700}
.c-name.is-admin{color:var(--admin-clr)}
.c-date{font-size:12px;color:var(--faint)}
.c-hidden-tag{font-size:10px;background:rgba(248,113,113,.12);color:#f87171;padding:1px 6px;border-radius:4px;font-weight:700}
.admin-tag{font-size:10px;background:rgba(139,92,246,.2);color:var(--admin-clr);padding:1px 6px;border-radius:4px;font-weight:700}
.c-body{font-size:15px;line-height:1.6;color:#ddd;word-break:break-word}

/* COMMENT FOOT: heart + actions */
.c-foot{display:flex;align-items:center;gap:2px;margin-top:7px;flex-wrap:wrap}

/* HEART BUTTON — YouTube style */
.hrt-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 8px;border-radius:18px;border:none;background:none;
  cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;
  color:var(--faint);transition:all .15s;
}
.hrt-btn:hover{background:var(--surface2);color:var(--muted)}
.hrt-btn.on{color:var(--love)}
.hrt-btn .h-ico{font-size:15px;transition:transform .2s;display:inline-block}
.hrt-btn.on .h-ico{transform:scale(1.2)}
.hrt-btn .h-cnt{font-size:12px;font-weight:700}
/* Admin creator heart — purple like YouTube */
.hrt-btn.admin-on{color:var(--admin-clr)}
.hrt-btn.admin-on .h-ico{transform:scale(1.3)}
/* Read-only heart badge for non-admin viewers */
.admin-heart-badge{font-size:14px;padding:2px 4px;cursor:default;user-select:none}
/* Read stat — passive display, not clickable */
.read-stat{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:22px;border:1px solid var(--border);background:var(--surface);font-size:14px;font-weight:600;color:var(--muted);user-select:none}

.c-act{padding:4px 9px;border-radius:18px;border:none;background:none;color:var(--faint);cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.c-act:hover{color:var(--text);background:var(--surface2)}
.c-act.del:hover{color:#f87171}

/* ADMIN REPLY */
.admin-reply{margin-top:10px;padding:10px 14px;background:var(--admin-bg);border-left:3px solid #7c3aed;border-radius:0 8px 8px 0}
.ar-top{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.ar-name{font-size:12px;font-weight:700;color:var(--admin-clr)}
.ar-date{font-size:11px;color:var(--faint)}
.ar-text{font-size:14px;color:#ccc;line-height:1.6}
.ar-del{margin-left:auto;padding:2px 8px;border-radius:8px;border:none;background:none;color:var(--faint);cursor:pointer;font-size:11px;transition:color .15s}
.ar-del:hover{color:#f87171}

/* REPLY INPUT */
.reply-wrap{margin-top:10px;display:none;gap:10px;align-items:flex-start}
.reply-wrap.open{display:flex}
.reply-ta{flex:1;background:var(--surface2);border:1px solid #4c1d95;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:9px 13px;outline:none;resize:none;min-height:64px;transition:border-color .2s}
.reply-ta:focus{border-color:#7c3aed}
.reply-sub{padding:8px 14px;border-radius:9px;border:none;background:#7c3aed;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .18s;white-space:nowrap}
.reply-sub:hover{background:#6d28d9}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:0 8px 30px rgba(0,0,0,.5);z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.s{border-color:var(--read);color:var(--read)}
.toast.e{border-color:var(--love);color:var(--love)}
.toast.i{border-color:var(--accent);color:var(--accent)}

/* MISC */
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite;margin:56px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ei{font-size:44px;margin-bottom:10px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
@media(max-width:600px){.search-wrap,.url-row{display:none}.detail-title{font-size:24px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- AUTH MODAL -->
<div class="overlay" id="authOverlay">
  <div class="modal">
    <div class="modal-h">Welcome</div>
    <div class="modal-sub">Sign in to like posts, heart comments, and more.</div>
    <div class="modal-tabs">
      <button class="mtab on" id="mT0" onclick="setMTab('login')">Sign In</button>
      <button class="mtab" id="mT1" onclick="setMTab('signup')">Sign Up</button>
    </div>
    <div id="mLogin">
      <div class="mfield"><label>Email</label><input id="mLE" type="email" placeholder="you@example.com"></div>
      <div class="mfield"><label>Password</label><input id="mLP" type="password" placeholder="••••••••"></div>
    </div>
    <div id="mSignup" style="display:none">
      <div class="mfield"><label>Name</label><input id="mSN" type="text" placeholder="Your name"></div>
      <div class="mfield"><label>Email</label><input id="mSE" type="email" placeholder="you@example.com"></div>
      <div class="mfield"><label>Password</label><input id="mSP" type="password" placeholder="••••••••"></div>
    </div>
    <div class="mfooter">
      <button class="btn-sec" onclick="closeAuth()">Cancel</button>
      <button class="btn-pri" id="mSub" onclick="doAuth()">Sign In</button>
    </div>
    <div class="mmsg" id="mMsg"></div>
  </div>
</div>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo" onclick="goHome()">Shri <span>Blog</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input placeholder="Search posts…" oninput="onSearch(this.value)">
  </div>
  <div class="spacer"></div>
  <div class="url-row">
    <label>API</label>
    <input id="bUrl" value="http://localhost:5000/api/v1" oninput="BASE=this.value.replace(/\/$/,'')">
    <div class="dot-wrap"><div class="dot" id="aDot"></div><span id="aTxt">—</span></div>
  </div>
  <div id="authArea"></div>
</header>
<div class="admin-bar" id="adminBar">🛡 <strong>Admin Mode</strong> · You can heart comments, reply, and moderate.</div>

<!-- HOME -->
<div id="homeView">
  <div class="home-inner">
    <div class="sec-title">Latest Posts</div>
    <div id="postsWrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- DETAIL -->
<div id="detailView">
  <div class="detail-inner">
    <button class="back" onclick="goHome()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      All Posts
    </button>
    <div id="detailBody"></div>
    <div id="commentsArea"></div>
  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────
let BASE = 'http://localhost:5000/api/v1';
let userToken  = localStorage.getItem('sb_ut') || '';
let adminToken = localStorage.getItem('sb_at') || '';
let currentUser= JSON.parse(localStorage.getItem('sb_user')||'null');
let isAdmin    = JSON.parse(localStorage.getItem('sb_admin')||'false');
let currentPost= null;
let mMode = 'login';
let sTimer = null;

function myToken(){ return isAdmin ? adminToken : userToken; }

// Comment hearts stored in localStorage
// Format: { [commentId]: { count:N, likedBy:[userId,...], adminHearted:bool } }
function getCL(){ try{ return JSON.parse(localStorage.getItem('sb_cl')||'{}'); }catch(e){ return {}; } }
function setCL(o){ localStorage.setItem('sb_cl', JSON.stringify(o)); }

// ── API ──────────────────────────────────────────────
async function api(method, path, body, tok){
  const t = tok !== undefined ? tok : myToken();
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if(t) opts.headers['Authorization'] = 'Bearer '+t;
  if(body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(BASE+path, opts);
    const d = await r.json().catch(()=>({}));
    return {ok:r.ok, status:r.status, data:d};
  } catch(e){ return {ok:false,status:0,data:{message:'Network error'}}; }
}

// ── UTILS ────────────────────────────────────────────
function toast(msg,type='i'){
  const el=document.getElementById('toast');
  el.textContent=({s:'✓ ',e:'✕ ',i:'· '}[type]||'')+msg;
  el.className='toast show '+type;
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2800);
}
function timeAgo(d){
  const s=(Date.now()-new Date(d))/1000;
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  if(s<604800) return Math.floor(s/86400)+'d ago';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function initials(n=''){ return n.split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?'; }
const catIcon={traditions:'🪔','artisan-crafts':'🎨',festivals:'🎉',wellness:'🌿',community:'🤝','sacred-recipes':'🍃'};

function renderAuth(){
  const area=document.getElementById('authArea');
  document.getElementById('adminBar').classList.toggle('show',isAdmin);
  if(currentUser){
    const name=currentUser.name||currentUser.email||'User';
    const cls=isAdmin?'av admin':'av u';
    area.innerHTML=`<div style="display:flex;align-items:center;gap:8px">
      <div class="${cls}">${initials(name)}</div>
      <span style="font-size:13px;font-weight:700;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>
      <button class="auth-btn" onclick="doLogout()" style="padding:5px 10px;font-size:12px">Out</button>
    </div>`;
  } else {
    area.innerHTML=`<button class="auth-btn" onclick="openAuth()">Sign in</button>`;
  }
}
function openAuth(){ document.getElementById('authOverlay').classList.add('open'); document.getElementById('mMsg').textContent=''; }
function closeAuth(){ document.getElementById('authOverlay').classList.remove('open'); }
function setMTab(m){
  mMode=m;
  document.getElementById('mT0').classList.toggle('on',m==='login');
  document.getElementById('mT1').classList.toggle('on',m==='signup');
  document.getElementById('mLogin').style.display=m==='login'?'':'none';
  document.getElementById('mSignup').style.display=m==='signup'?'':'none';
  document.getElementById('mSub').textContent=m==='login'?'Sign In':'Create Account';
  document.getElementById('mMsg').textContent='';
}
async function doAuth(){
  const btn=document.getElementById('mSub'),msg=document.getElementById('mMsg');
  btn.disabled=true; msg.textContent='';
  let body,ep;
  if(mMode==='login'){
    const e=document.getElementById('mLE').value.trim(),p=document.getElementById('mLP').value;
    if(!e||!p){msg.textContent='Fill all fields';msg.className='mmsg err';btn.disabled=false;return;}
    body={email:e,password:p};ep='/auth/login';
  } else {
    const n=document.getElementById('mSN').value.trim(),e=document.getElementById('mSE').value.trim(),p=document.getElementById('mSP').value;
    if(!n||!e||!p){msg.textContent='Fill all fields';msg.className='mmsg err';btn.disabled=false;return;}
    body={name:n,email:e,password:p};ep='/auth/signup';
  }
  const {ok,data}=await api('POST',ep,body,'');
  if(ok){
    const tok=data.token||data.data?.token;
    const user=data.data?.user||data.user||{email:body.email,name:body.name};
    const role=user.role||data.data?.role||'';
    if(role==='admin'){
      adminToken=tok;isAdmin=true;
      localStorage.setItem('sb_at',tok);localStorage.setItem('sb_admin','true');
    } else {
      userToken=tok;isAdmin=false;
      localStorage.setItem('sb_ut',tok);localStorage.setItem('sb_admin','false');
    }
    currentUser=user;localStorage.setItem('sb_user',JSON.stringify(user));
    msg.textContent='✓ Signed in!';msg.className='mmsg ok';
    setTimeout(()=>{ closeAuth();renderAuth();if(currentPost)loadComments(currentPost._id); },700);
  } else {
    msg.textContent=data.message||'Authentication failed';msg.className='mmsg err';
  }
  btn.disabled=false;
}
function doLogout(){
  userToken='';adminToken='';currentUser=null;isAdmin=false;
  ['sb_ut','sb_at','sb_user','sb_admin'].forEach(k=>localStorage.removeItem(k));
  toast('Signed out','i');renderAuth();
  if(currentPost) loadComments(currentPost._id);
}

async function openPost(id){
  document.getElementById('homeView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('detailBody').innerHTML='<div class="spinner"></div>';
  document.getElementById('commentsArea').innerHTML='';
  window.scrollTo(0,0);
  const {ok,data}=await api('GET','/blogs/'+id,null,myToken()||'');
  if(ok){
    currentPost=data.data.post;
    renderDetail(currentPost);
    await loadReactions(id); // also auto-marks read inside
    loadComments(id);
  } else {
    document.getElementById('detailBody').innerHTML='<div class="empty"><div class="ei">😕</div><p>Post not found.</p></div>';
  }
}

function renderDetail(p){
  const blocks=(p.blocks||[]).map(b=>{
    if(b.type==='heading') return `<h${b.level||3}>${b.text||b.html}</h${b.level||3}>`;
    if(b.type==='paragraph') return `<p>${b.html||b.text}</p>`;
    if(b.type==='blockquote'||b.type==='pullquote') return `<blockquote>${b.html||b.text}</blockquote>`;
    if(b.type==='image'&&b.url) return `<img src="${b.url}" alt="${b.alt||''}">`;
    if(b.type==='list') return `<${b.ordered?'ol':'ul'}>${(b.items||[]).map(i=>`<li>${i}</li>`).join('')}</${b.ordered?'ol':'ul'}>`;
    if(b.type==='divider') return `<hr style="border:none;border-top:1px solid var(--border);margin:22px 0">`;
    return '';
  }).join('');
  const cover=p.coverImage?.url
    ?`<img class="detail-cover" src="${p.coverImage.url}" alt="${p.title}">`
    :`<div class="detail-cover-ph">${catIcon[p.category]||'📖'}</div>`;
  document.getElementById('detailBody').innerHTML=`
    ${cover}
    <div class="detail-cat">${p.category}${p.tags?.length?' · '+p.tags.join(', '):''}</div>
    <h1 class="detail-title">${p.title}</h1>
    ${p.subtitle?`<p class="detail-sub">${p.subtitle}</p>`:''}
    <div class="detail-meta">
      <span class="detail-author">${p.author||'Shri Brand'}</span>
      <span class="mdot">·</span>
      <span>${new Date(p.publishDate||p.createdAt).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</span>
      <span class="mdot">·</span>
      <span>${p.readTime||'2 min read'}</span>
    </div>
    <div class="post-rxn-bar">
      <button class="prx" id="pLove" onclick="togglePostLove()" title="Like this post">
        <span id="pLoveIco">🤍</span>
        <span id="pLoveLbl">Like</span>
        <span class="cnt" id="pLoveCnt">0</span>
      </button>
      <div class="read-stat" id="pReadStat" title="Unique readers">
        <span>👁</span>
        <span id="pReadCnt">0</span>
        <span style="font-size:12px;color:var(--muted)">reads</span>
      </div>
    </div>
    <div class="blog-content">${blocks}</div>`;
}

// ── POST REACTIONS ───────────────────────────────────
// READ  → auto-fires silently when user opens a post (once per user, no duplicate)
// LOVE  → manual toggle button, completely independent
//
// Backend stores ONE reaction per user (read OR love).
// So we track them separately:
//   • "read"  is sent silently on open — only if user has NO reaction yet
//   • "love"  is the manual like button — toggles independently
//   • Both counts shown from API reactionCounts

async function loadReactions(id){
  const {ok,data}=await api('GET','/blogs/'+id+'/reactions',null,myToken()||'');
  if(!ok) return;
  const rc=data.data?.reactionCounts||{};
  const yr=data.data?.yourReaction; // 'read' | 'love' | null

  // Update read count display (read-only stat, no button)
  document.getElementById('pReadCnt').textContent=rc.read||0;

  // Update love button
  document.getElementById('pLoveCnt').textContent=rc.love||0;
  document.getElementById('pLoveIco').textContent=yr==='love'?'❤️':'🤍';
  document.getElementById('pLoveLbl').textContent=yr==='love'?'Liked':'Like';
  document.getElementById('pLove').className='prx'+(yr==='love'?' love-on':'');

  // AUTO READ: if logged in and user has no reaction yet → silently mark as read (once)
  // yr===null means this user hasn't reacted at all → safe to add 'read'
  // yr==='read' means already counted → skip (no duplicate)
  // yr==='love' means user loved it → don't overwrite their love with read
  if(myToken() && yr===null){
    autoMarkRead(id);
  }
}

// Silently calls the API to mark as 'read'. No UI toast, no disruption.
// Backend toggle logic: if user has no reaction → adds 'read'. That's exactly what we want.
async function autoMarkRead(id){
  const {ok,data}=await api('POST','/blogs/'+id+'/reactions',{type:'read'},myToken());
  if(ok){
    // Update read count silently
    const rc=data.data?.reactionCounts||{};
    document.getElementById('pReadCnt').textContent=rc.read||0;
  }
}

// LOVE button — manual toggle, independent
async function togglePostLove(){
  if(!myToken()){toast('Sign in to like','i');openAuth();return;}

  // Check current state from button class
  const btn=document.getElementById('pLove');
  const isLoved=btn.classList.contains('love-on');

  // If currently loved → toggle off (removes reaction, user goes back to unreacted)
  // If not loved:
  //   - if user was 'read' → switches to 'love' (backend: existing.type = type)
  //   - if user has no reaction → adds 'love'
  const {ok,data}=await api('POST','/blogs/'+currentPost._id+'/reactions',{type:'love'},myToken());
  if(ok){
    const rc=data.data?.reactionCounts||{};
    const yr=data.data?.yourReaction; // null if toggled off, 'love' if added

    document.getElementById('pLoveCnt').textContent=rc.love||0;
    document.getElementById('pReadCnt').textContent=rc.read||0;
    document.getElementById('pLoveIco').textContent=yr==='love'?'❤️':'🤍';
    document.getElementById('pLoveLbl').textContent=yr==='love'?'Liked':'Like';
    btn.className='prx'+(yr==='love'?' love-on':'');

    // If user un-loved (yr===null), silently re-add read so count stays accurate
    if(yr===null){ autoMarkRead(currentPost._id); }
  } else {
    toast(data.message||'Could not like','e');
  }
}

// ── COMMENTS ─────────────────────────────────────────
async function loadComments(postId){
  const area=document.getElementById('commentsArea');
  const {ok,data}=await api('GET','/blogs/'+postId+'/comments',null,myToken()||'');
  if(!ok){area.innerHTML='<p style="color:var(--muted);font-size:13px;padding:20px 0">Could not load comments.</p>';return;}
  renderComments(postId,data.data?.comments||[]);
}

function renderComments(postId,comments){
  const name=currentUser?.name||currentUser?.email||'';
  const avCls=isAdmin?'cav a':currentUser?'cav u':'cav';
  const inputBlock=currentUser?`
    <div class="ci-wrap">
      <div class="${avCls}">${name?initials(name):'👤'}</div>
      <div class="ci-right">
        <textarea class="ci-ta" id="newCTa" placeholder="Add a comment…"
          onfocus="showCI()" oninput="updateCI()"></textarea>
        <div class="ci-acts" id="newCActs">
          <button class="ca-cancel" onclick="cancelCI()">Cancel</button>
          <button class="ca-sub" id="newCSub" onclick="postComment('${postId}')" disabled>Comment</button>
        </div>
      </div>
    </div>`:`
    <div class="ci-wrap">
      <div class="cav">👤</div>
      <div class="login-prompt"><a onclick="openAuth()">Sign in</a> to leave a comment</div>
    </div>`;
  const list=comments.length
    ?comments.map(c=>commentHTML(postId,c)).join('')
    :'<div class="empty" style="padding:18px 0"><p style="font-size:14px">No comments yet — be first!</p></div>';
  document.getElementById('commentsArea').innerHTML=`
    <div class="comments-wrap">
      <div class="comments-hdr"><h3>Comments</h3><span class="cnt-badge">${comments.length}</span></div>
      ${inputBlock}
      <div id="cList">${list}</div>
    </div>`;
}

function commentHTML(postId,c){
  const cid=c._id;
  const aName=c.author?.name||c.author?.email||'User';
  const isCA=c.author?.role==='admin';
  const avCls=isCA?'cav a':'cav u';
  const uid=currentUser?._id||currentUser?.email||'';

  // ── COMMENT HEART: ADMIN ONLY (like YouTube creator heart) ──
  // Only admin can heart a comment. Regular users cannot.
  // Stored in localStorage: { [commentId]: { hearted: bool } }
  const cl=getCL();
  const entry=cl[cid]||{hearted:false};
  const adminHearted=entry.hearted||false;

  let heartBtnHTML='';
  if(isAdmin){
    // Admin sees toggle heart button (purple when active)
    heartBtnHTML=`<button class="hrt-btn${adminHearted?' admin-on':''}" id="hb_${cid}" onclick="toggleAdminHeart('${cid}')" title="Heart this comment"><span class="h-ico">${adminHearted?'❤️':'🤍'}</span></button>`;
  } else if(adminHearted){
    // Everyone else sees a read-only ❤️ badge when admin has hearted
    heartBtnHTML=`<span class="admin-heart-badge" title="Liked by creator">❤️</span>`;
  }


  const canEdit=currentUser&&!isAdmin&&(c.author?._id===uid||c.author===uid);
  const canDel=currentUser&&(canEdit||isAdmin);
  const editBtn=canEdit?`<button class="c-act" onclick="startEdit('${postId}','${cid}')">Edit</button>`:'';
  const delBtn=canDel?`<button class="c-act del" onclick="delComment('${postId}','${cid}')">Delete</button>`:'';
  const hideBtn=isAdmin?`<button class="c-act" onclick="toggleHide('${postId}','${cid}',${c.isHidden})">${c.isHidden?'Unhide':'Hide'}</button>`:'';
  const replyBtn=isAdmin?`<button class="c-act" onclick="toggleReplyBox('${cid}')">Reply</button>`:'';

  const replyBlock=c.adminReply?`
    <div class="admin-reply">
      <div class="ar-top">
        <span class="ar-name">Shri Brand</span>
        <span class="admin-tag">★ Admin</span>
        <span class="ar-date">${timeAgo(c.adminReply.repliedAt)}</span>
        ${isAdmin?`<button class="ar-del" onclick="delReply('${postId}','${cid}')">✕ Remove</button>`:''}
      </div>
      <div class="ar-text">${c.adminReply.body}</div>
    </div>`:'';

  const replyInput=isAdmin?`
    <div class="reply-wrap" id="ri_${cid}">
      <div class="cav a" style="width:30px;height:30px;font-size:11px;flex-shrink:0">${initials(currentUser?.name||'A')}</div>
      <div style="flex:1">
        <textarea class="reply-ta" id="rt_${cid}" placeholder="Reply as admin…"></textarea>
        <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:6px">
          <button class="ca-cancel" onclick="toggleReplyBox('${cid}')">Cancel</button>
          <button class="reply-sub" onclick="submitReply('${postId}','${cid}')">Reply</button>
        </div>
      </div>
    </div>`:'';

  return `
    <div class="comment-item" id="ci_${cid}" ${c.isHidden?'style="opacity:.4"':''}>
      <div class="${avCls}" style="flex-shrink:0">${initials(aName)}</div>
      <div class="cb-wrap">
        <div class="c-top">
          <span class="c-name${isCA?' is-admin':''}">${aName}</span>
          ${isCA?'<span class="admin-tag">★ Admin</span>':''}
          <span class="c-date">${timeAgo(c.createdAt)}</span>
          ${c.isHidden?'<span class="c-hidden-tag">hidden</span>':''}
        </div>
        <div class="c-body" id="cb_${cid}">${c.body}</div>
        ${replyBlock}
        ${replyInput}
        <div class="c-foot">
          ${heartBtnHTML}
          ${editBtn}${delBtn}${hideBtn}${replyBtn}
        </div>
      </div>
    </div>`;
}

// ── COMMENT HEARTS: ADMIN ONLY (YouTube creator heart) ──────
// Only admin can toggle a heart on a comment.
// Stored in localStorage: { [commentId]: { hearted: bool } }
function toggleAdminHeart(cid){
  if(!isAdmin) return;
  const cl=getCL();
  const e=cl[cid]||{hearted:false};
  const wasHearted=e.hearted||false;
  e.hearted=!wasHearted;
  cl[cid]=e; setCL(cl);
  // Update button in place
  const btn=document.getElementById('hb_'+cid);
  if(btn){
    btn.className='hrt-btn'+(e.hearted?' admin-on':'');
    const ico=btn.querySelector('.h-ico');
    if(ico){
      ico.textContent=e.hearted?'❤️':'🤍';
      if(e.hearted){ ico.style.transform='scale(1.6)'; setTimeout(()=>ico.style.transform='',280); }
    }
  } else {
    // btn not found means we need full re-render (e.g. badge became button)
    if(currentPost) loadComments(currentPost._id);
  }
  if(e.hearted) toast('❤️ Hearted!','s');
}


// ── COMMENT INPUT ─────────────────────────────────────
function showCI(){ document.getElementById('newCActs')?.classList.add('vis'); }
function cancelCI(){
  const ta=document.getElementById('newCTa');
  if(ta) ta.value='';
  document.getElementById('newCActs')?.classList.remove('vis');
  const s=document.getElementById('newCSub');
  if(s){s.disabled=true;s.classList.remove('on');}
}
function updateCI(){
  const v=document.getElementById('newCTa')?.value?.trim();
  const s=document.getElementById('newCSub');
  if(!s) return;
  s.disabled=!v; s.classList.toggle('on',!!v);
}
async function postComment(postId){
  const body=document.getElementById('newCTa').value.trim();
  if(!body) return;
  const s=document.getElementById('newCSub');
  s.disabled=true;
  const {ok,data}=await api('POST','/blogs/'+postId+'/comments',{body});
  if(ok){ toast('Comment posted!','s'); cancelCI(); await loadComments(postId); }
  else{ toast(data.message||'Could not post','e'); s.disabled=false; }
}

// ── ADMIN REPLY ───────────────────────────────────────
function toggleReplyBox(cid){
  const el=document.getElementById('ri_'+cid);
  if(!el) return;
  el.classList.toggle('open');
  if(el.classList.contains('open')) document.getElementById('rt_'+cid)?.focus();
}
async function submitReply(postId,cid){
  const body=document.getElementById('rt_'+cid)?.value?.trim();
  if(!body) return;
  const {ok,data}=await api('POST','/blogs/'+postId+'/comments/'+cid+'/reply',{body},adminToken);
  if(ok){toast('Reply posted!','s');await loadComments(postId);}
  else toast(data.message||'Error','e');
}
async function delReply(postId,cid){
  if(!confirm('Remove this reply?')) return;
  const {ok,data}=await api('DELETE','/blogs/'+postId+'/comments/'+cid+'/reply',null,adminToken);
  if(ok){toast('Reply removed','i');await loadComments(postId);}
  else toast(data.message||'Error','e');
}

// ── COMMENT CRUD ──────────────────────────────────────
async function delComment(postId,cid){
  if(!confirm('Delete this comment?')) return;
  const {ok,data}=await api('DELETE','/blogs/'+postId+'/comments/'+cid,null,myToken());
  if(ok){toast('Deleted','i');await loadComments(postId);}
  else toast(data.message||'Permission denied','e');
}
async function toggleHide(postId,cid,hidden){
  const path=hidden?'/unhide':'/hide';
  const {ok,data}=await api('PATCH','/blogs/'+postId+'/comments/'+cid+path,{},adminToken);
  if(ok){toast(hidden?'Comment visible':'Comment hidden','i');await loadComments(postId);}
  else toast(data.message||'Error','e');
}
function startEdit(postId,cid){
  const cb=document.getElementById('cb_'+cid);
  if(!cb) return;
  const orig=cb.innerText;
  cb.innerHTML=`<textarea style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:8px 11px;outline:none;resize:none;min-height:60px" id="ea_${cid}">${orig}</textarea>
    <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:6px">
      <button class="ca-cancel" onclick="loadComments('${postId}')">Cancel</button>
      <button class="reply-sub" style="background:var(--accent)" onclick="saveEdit('${postId}','${cid}')">Save</button>
    </div>`;
}
async function saveEdit(postId,cid){
  const body=document.getElementById('ea_'+cid)?.value?.trim();
  if(!body) return;
  const {ok,data}=await api('PATCH','/blogs/'+postId+'/comments/'+cid,{body},userToken);
  if(ok){toast('Updated','s');await loadComments(postId);}
  else toast(data.message||'Error','e');
}

// ── NAV ───────────────────────────────────────────────
